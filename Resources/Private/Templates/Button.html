<html
    data-namespace-typo3-fluid="true"
    xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers">

    <f:layout name="Default" />

    <f:section name="Main">

        <f:variable name="frameClasses">
            container container-uw
            frame
            frame-{data.frame_class}
            frame-type-{data.CType}
            frame-layout-{data.layout}
        </f:variable>

        <div class="tx-supi__button {frameClasses}"
             data-hide-overlay="{settings.hideOverlayOnButtonCe}"
             id="c{data.uid}">
            <div>
                <f:if condition="{data._LOCALIZED_UID}">
                    <a id="c{data._LOCALIZED_UID}"></a>
                </f:if>

                <f:if condition="{data.header_layout} !== 100">
                    <header class="tx-supi__button-header">
                        <h{data.header_layout}>{data.header}</h{data.header_layout}>
                    </header>
                </f:if>

                <f:if condition="{data.bodytext} != ''">
                    <div class="tx-supi__button-content | bodytext">
                        {data.bodytext -> f:format.html()}
                    </div>
                </f:if>

                <button id="supi__choose" class="btn btn-primary">
                    {f:translate(key: '{settings.button.choose.text}', default: '{settings.button.choose.text}', extensionName: 'Supi')}
                </button>
            </div>
        </div>
    </f:section>

</html>
