<html data-namespace-typo3-fluid="true" xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers">

<dialog id="supi__banner"
     class="tx-supi position position-{f:if(condition: settings.position, then: 'center-center', else: 'bottom-left')} theme theme-{settings.theme} {hideBanner}"
     aria-describedby="supi__description" aria-labelledby="supi__label">
    <f:if condition="{settings.detailed}">
        <f:then>
            <f:render partial="Detailview" arguments="{_all}"/>
        </f:then>
        <f:else>
            <f:render partial="Overview" arguments="{_all}"/>
        </f:else>
    </f:if>
</dialog>

</html>
